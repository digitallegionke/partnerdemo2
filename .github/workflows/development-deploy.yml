name: Dev Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    env:
      APPLICATION_NAME: "Roundi Provider Webapp"

    steps:
      - uses: actions/checkout@v4

      - name: Notify Slack Build and Push Started
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload-file-path: ".github/slack-payloads/start.json"
          payload-templated: true
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/roundiafrica/roundi_providers_webapp:latest

      - name: Notify Slack Build and Push was Successful
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload-file-path: ".github/slack-payloads/success.json"
          payload-templated: true
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack Build and Push Failed
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload-file-path: ".github/slack-payloads/failure.json"
          payload-templated: true
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-to-dokploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Trigger Dokploy deployment
        uses: benbristow/dokploy-deploy-action@0.2.2
        with:
          api_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          application_id: ${{ secrets.DOKPLOY_DEV_APPLICATION_ID }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          service_type: application
